name: solver-builds

on:
  push:
    tags: ["v?[0-9]+"]
    branches: [main, "release-**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04,
             macos-14, macos-15, macos-26,
             windows-2025, windows-2022]
        solver: [z3-4.12.1, z3-4.12.6, z3-4.14.1, z3-4.15.4]
        arch: [x64]
        include:
          - os: macos-14
            arch: arm64
            solver: z3-4.12.1
          - os: macos-15
            arch: arm64
            solver: z3-4.12.1
          - os: macos-26
            arch: arm64
            solver: z3-4.12.1
          - os: macos-14
            arch: arm64
            solver: z3-4.12.6
          - os: macos-15
            arch: arm64
            solver: z3-4.12.6
          - os: macos-26
            arch: arm64
            solver: z3-4.12.6
          - os: macos-14
            arch: arm64
            solver: z3-4.14.1
          - os: macos-15
            arch: arm64
            solver: z3-4.14.1
          - os: macos-26
            arch: arm64
            solver: z3-4.14.1
          - os: macos-14
            arch: arm64
            solver: z3-4.15.4
          - os: macos-15
            arch: arm64
            solver: z3-4.15.4
          - os: macos-26
            arch: arm64
            solver: z3-4.15.4
          - os: windows-11-arm
            arch: arm64
            solver: z3-4.14.1
          - os: windows-11-arm
            arch: arm64
            solver: z3-4.15.4
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install dependencies (Windows, x64)
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: |
            make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            python
            tar
        if: runner.os == 'Windows' && matrix.arch == 'x64'

      - name: Install dependencies (Windows, ARM64)
        if: runner.os == 'Windows' && matrix.arch == 'arm64'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup MSVC (Windows, ARM64)
        if: runner.os == 'Windows' && matrix.arch == 'arm64'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Build (non-Windows)
        shell: bash
        run: scripts/build.sh ${{ matrix.solver }} ${{ matrix.arch }}
        if: runner.os != 'Windows'

      - name: Build (Windows, x64)
        shell: msys2 {0}
        run: scripts/build.sh ${{ matrix.solver }} ${{ matrix.arch }}
        if: runner.os == 'Windows' && matrix.arch == 'x64'

      - name: Build (Windows, ARM64)
        if: runner.os == 'Windows' && matrix.arch == 'arm64'
        shell: bash
        run: scripts/build.sh ${{ matrix.solver }} ${{ matrix.arch }}

      - name: Verify (Windows, ARM64)
        if: runner.os == 'Windows' && matrix.arch == 'arm64'
        run: bin\${{ matrix.solver }}.exe --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: bin
          name: ${{ matrix.solver }}-${{ matrix.arch }}-${{ matrix.os }}-bin
